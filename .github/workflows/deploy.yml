name: Deploy to GitHub Pages (User Site)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 移除 cache: 'npm'，避免锁文件检测失败
          # 若后续生成了锁文件，可加回 cache: 'npm'

      - name: Install dependencies (force generate lock file)
        run: |
          npm install --package-lock-only  # 强制生成 package-lock.json
          npm install                      # 安装依赖

      - name: Build Astro project
        run: npm run build

      - name: Deploy to csb.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
